# =============================================================================
# Multi-Agent Deployment: Orchestrator + Agent Containers
#
# Usage:
#   1. Create a .env file with: AGENT_API_KEY=<your-secret-key>
#   2. docker compose up --build
#
# To add more agents: copy an agent service definition below with a new name
# and volume. Do NOT use --scale — per-agent named volumes prevent SQLite
# corruption from concurrent access. Dynamic scaling requires Kubernetes.
# =============================================================================

services:
  orchestrator:
    build:
      context: .
      dockerfile: dockerfiles/webui.Dockerfile
    stop_grace_period: 30s
    ports:
      - "8080:8080"
    volumes:
      - ./config/pipeline:/app/config/pipeline
    environment:
      - AGENT_API_KEY=${AGENT_API_KEY}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS:-}
      - OTEL_SERVICE_NAME=coding-agent-orchestrator
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=${DEPLOYMENT_ENVIRONMENT:-production},service.namespace=coding-agent-automation
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - coding-agent-net

  agent-dotnet-1:
    build:
      context: .
      dockerfile: dockerfiles/kiro/agent-kiro-dotnet10.Dockerfile
    volumes:
      - ./config/kiro-cli-data-1:/home/ubuntu/.local/share/kiro-cli
      - ~/.aws:/home/ubuntu/.aws:ro
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:8080
      - AGENT_ID=agent-1
      - AGENT_TYPE=kiro-dotnet10
      - AGENT_LABELS=kiro,dotnet,dotnet10
      - AGENT_API_KEY=${AGENT_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-Information}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS:-}
      - OTEL_SERVICE_NAME=coding-agent-worker-dotnet-1
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=${DEPLOYMENT_ENVIRONMENT:-production},service.namespace=coding-agent-automation,service.instance.id=agent-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      orchestrator:
        condition: service_healthy
    networks:
      - coding-agent-net

