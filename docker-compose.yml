# =============================================================================
# Multi-Agent Deployment: Orchestrator + Agent Containers
#
# Usage:
#   1. Create a .env file with: AGENT_API_KEY=<your-secret-key>
#   2. docker compose up --build
#
# To add more agents: copy an agent service definition below with a new name
# and volume. Do NOT use --scale — per-agent named volumes prevent SQLite
# corruption from concurrent access. Dynamic scaling requires Kubernetes.
# =============================================================================

services:
  orchestrator:
    build:
      context: .
      dockerfile: webUI.Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./config/pipeline:/app/config/pipeline
    environment:
      - AGENT_API_KEY=${AGENT_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - coding-agent-net

  agent-dotnet-1:
    build:
      context: .
      dockerfile: agent.Dockerfile
    volumes:
      - ./config/kiro-cli-data-1:/home/ubuntu/.local/share/kiro-cli
      - ~/.aws:/home/ubuntu/.aws:ro
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:5000
      - AGENT_ID=agent-1
      - AGENT_TYPE=kiro-dotnet10
      - AGENT_LABELS=kiro,dotnet,dotnet10
      - AGENT_API_KEY=${AGENT_API_KEY}
    depends_on:
      orchestrator:
        condition: service_healthy
    networks:
      - coding-agent-net

  agent-dotnet-2:
    build:
      context: .
      dockerfile: agent.Dockerfile
    volumes:
      - ./config/kiro-cli-data-2:/home/ubuntu/.local/share/kiro-cli
      - ~/.aws:/home/ubuntu/.aws:ro
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:5000
      - AGENT_ID=agent-2
      - AGENT_TYPE=kiro-dotnet10
      - AGENT_LABELS=kiro,dotnet,dotnet10
      - AGENT_API_KEY=${AGENT_API_KEY}
    depends_on:
      orchestrator:
        condition: service_healthy
    networks:
      - coding-agent-net

  agent-python:
    build:
      context: .
      dockerfile: agent.Dockerfile
    volumes:
      - ./config/kiro-cli-data-3:/home/ubuntu/.local/share/kiro-cli
      - ~/.aws:/home/ubuntu/.aws:ro
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:5000
      - AGENT_ID=agent-python
      - AGENT_TYPE=kiro-python312
      - AGENT_LABELS=kiro,python,python312
      - AGENT_API_KEY=${AGENT_API_KEY}
    depends_on:
      orchestrator:
        condition: service_healthy
    networks:
      - coding-agent-net

  agent-java:
    build:
      context: .
      dockerfile: agent.Dockerfile
    volumes:
      - ./config/kiro-cli-data-4:/home/ubuntu/.local/share/kiro-cli
      - ~/.aws:/home/ubuntu/.aws:ro
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:5000
      - AGENT_ID=agent-java
      - AGENT_TYPE=kiro-java21
      - AGENT_LABELS=kiro,java,java21
      - AGENT_API_KEY=${AGENT_API_KEY}
    depends_on:
      orchestrator:
        condition: service_healthy
    networks:
      - coding-agent-net

networks:
  coding-agent-net:
