# =============================================================================
# PostgreSQL Override for Local Development
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up
#
# Adds a Postgres instance and configures the orchestrator to use it for
# persistence (DB-backed config store + work item tracking).
# WorkDistribution mode defaults to SignalR (hybrid: DB persistence + SignalR delivery).
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: caa
      POSTGRES_PASSWORD: caa_dev_password
      POSTGRES_DB: coding_agent_automation
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caa -d coding_agent_automation"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - coding-agent-net

  orchestrator:
    environment:
      - Database__ConnectionString=Host=postgres;Port=5432;Database=coding_agent_automation;Username=caa;Password=caa_dev_password;Include Error Detail=true
      - Database__MigrateOnStartup=true
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
