# coding-agent-automation Helm chart values
# See README for full documentation.

nameOverride: ""
fullnameOverride: ""

# ── Global image defaults ────────────────────────────────────────────────────

image:
  pullPolicy: IfNotPresent

# ── Orchestrator ─────────────────────────────────────────────────────────────

orchestrator:
  image:
    repository: chemsorly/coding-agent
    # Tag for the orchestrator image. On release, CI overwrites this to semver.
    tag: coding-agent-webui
  replicas: 1
  # Additional annotations on the Deployment metadata (e.g., reloader.stakater.com/auto: "true")
  annotations: {}
  # Pod-level securityContext (e.g., runAsUser, fsGroup for hostPath ownership)
  podSecurityContext: {}
  # Extra initContainers injected before the main container (e.g., permission fixers)
  initContainers: []
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    # Storage backend: pvc (default/cloud), hostPath (bare-metal), emptyDir (testing)
    type: pvc
    hostPath: ""
    pvc:
      # StorageClass name. Empty string = cluster default.
      # Recommendation: use a storageClass with WaitForFirstConsumer volume binding mode
      # for topology-aware provisioning (PVC provisioned on same node as pod).
      storageClassName: ""
      size: 5Gi
    # Controls how the legacy pipeline-config volume is mounted.
    # readWrite  — default, current behavior (read+write to JSON config files)
    # readOnly   — migration source when database.enabled: true (mount at /app/config/pipeline read-only)
    # disabled   — no mount (after migration is confirmed complete)
    mountMode: readWrite
  probes:
    liveness:
      path: /healthz
      port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      path: /readyz
      port: 8080
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
  terminationGracePeriodSeconds: 30
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  nodeSelector: {}
  affinity: {}
  tolerations: []
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    #  - host: coding-agent.example.com
    #    paths:
    #      - path: /
    #        pathType: Prefix
    tls: []
    #  - secretName: coding-agent-tls
    #    hosts:
    #      - coding-agent.example.com
  env:
    # Seconds to wait before resuming pipeline loop after pod restart (prevents dispatch to
    # agents mid-termination during rolling updates). Must be > agent terminationGracePeriodSeconds.
    pipelineLoopStartupDelaySeconds: 30
    # Seconds to wait after marking /readyz as 503 before proceeding with shutdown.
    readinessDrainDelaySeconds: 15
    # Log level for the orchestrator application
    logLevel: Information

# ── Agents (SignalR mode) ─────────────────────────────────────────────────────

# Agent Deployments for SignalR work distribution mode (workDistribution.mode: SignalR).
# Each entry produces its own Deployment + optional PVC — persistent containers that
# connect via SignalR and receive jobs from the orchestrator.
# In Kubernetes mode, these Deployments are NOT created. Use 'jobTemplates' instead
# to define the K8s Job pod spec for ephemeral agent pods.
agents:
  - name: agent-kiro-dotnet-1
    enabled: true
    image:
      repository: chemsorly/coding-agent
      tag: coding-agent-kiro-dotnet10
    # Provider type determines volume mount profile:
    #   kiro    → mounts kiro-cli-data volume
    #   opencode → mounts opencode config file from Secret
    providerType: kiro
    labels: "kiro,dotnet,dotnet10"
    # Max concurrent Jobs for this label set in K8s mode. 0 = no limit.
    maxConcurrent: 0
    # Additional annotations on the Deployment metadata
    annotations: {}
    # Pod-level securityContext
    podSecurityContext: {}
    # Extra initContainers
    initContainers: []
    persistence:
      # Storage backend: pvc (default/cloud), hostPath (bare-metal), emptyDir (testing)
      # Recommendation: use a storageClass with WaitForFirstConsumer volume binding mode.
      type: pvc
      hostPath: ""
      pvc:
        storageClassName: ""
        size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "4"
        memory: 8Gi
    terminationGracePeriodSeconds: 15
    strategy:
      type: Recreate
    nodeSelector: {}
    affinity: {}
    tolerations: []
    logLevel: Information

# ── Secrets ──────────────────────────────────────────────────────────────────

secrets:
  # REQUIRED: API key for agent-orchestrator authentication.
  # Plain string value. Chart fails if empty and no existingSecret is set.
  agentApiKey: ""

  # Optional: OTEL exporter authorization header (e.g., "Api-Token dt0c01.xxx" for Dynatrace)
  otelHeaders: ""

  # Optional: OpenCode configuration JSON content (mounted as file for opencode agents)
  # Multi-line JSON string containing the opencode provider configuration.
  opencodeConfigContent: ""

# Name of an existing Kubernetes Secret to use instead of creating one.
# When set, the chart does NOT create a Secret resource and references this name
# in all volume mounts and env var sources.
# The referenced Secret must contain keys: agent-api-key, otel-headers,
# opencode-config-content
existingSecret: ""

# ── OpenTelemetry ────────────────────────────────────────────────────────────

otel:
  endpoint: ""
  protocol: grpc
  serviceName: coding-agent-orchestrator
  resourceAttributes: ""

# ── ServiceAccount ───────────────────────────────────────────────────────────

serviceAccount:
  create: true
  automountServiceAccountToken: false
  annotations: {}
  name: ""

# ── Database (PostgreSQL) ────────────────────────────────────────────────────

database:
  # Enable PostgreSQL-backed persistence. When false, system uses JSON file store (current behavior).
  enabled: false
  # PostgreSQL host (service DNS name or IP). Required when enabled=true.
  host: ""
  # PostgreSQL port.
  port: 5432
  # Kubernetes Secret containing database credentials.
  # Must contain keys for username, password, and database name (defaults to standard Postgres env var names).
  auth:
    # Name of an existing K8s Secret with database credentials. Required when enabled=true.
    existingSecret: ""
    # Key names within the Secret (defaults match standard Postgres container env vars).
    keys:
      username: POSTGRES_USER
      password: POSTGRES_PASSWORD
      database: POSTGRES_DB
  # Npgsql SSL mode: Disable, Prefer, Require, VerifyCA, VerifyFull.
  # Defaults to Require in production if not set. Use "Disable" for in-cluster Postgres without TLS.
  sslMode: ""
  # Apply EF Core migrations on orchestrator startup. Uses distributed lock for multi-replica safety.
  migrateOnStartup: true

# ── Work Distribution ────────────────────────────────────────────────────────

workDistribution:
  # Mode: SignalR (default, docker-compose compatible) or Kubernetes (K8s Job dispatch).
  mode: SignalR
  # DispatchService settings (Kubernetes mode only)
  dispatch:
    intervalSeconds: 10
    rateLimitPerSecond: 10
  # ReconciliationService settings (Kubernetes mode only)
  reconciliation:
    intervalSeconds: 30
    timeoutEnforcementEnabled: true
    staleRetentionDays: 7

# ── Credential Pools ─────────────────────────────────────────────────────────

credentialPools:
  # List of PVC names for kiro agent credential data.
  # DispatchService claims an available PVC per kiro-type Job.
  kiro: []
  # Example:
  # kiro:
  #   - caa-kiro-cli-data-0
  #   - caa-kiro-cli-data-1
  #   - caa-kiro-cli-data-2

# ── Job Templates (Kubernetes mode) ─────────────────────────────────────────

# Job templates define the K8s Job pod spec for each agent label set.
# Used ONLY in Kubernetes work distribution mode (workDistribution.mode: Kubernetes).
# Each entry becomes a template in the job-templates ConfigMap that DispatchService
# uses to create K8s Job pods per WorkItem.
#
# If empty, falls back to the 'agents' list for backward compatibility.
# When both 'jobTemplates' and 'agents' are populated, jobTemplates takes
# priority — agents[] is only used as fallback when jobTemplates is empty.
# When migrating from a unified 'agents' config to split mode, populate this
# section with your K8s Job-specific settings and keep 'agents' for SignalR Deployments.
jobTemplates: []
  # Example:
  # - labels: "kiro,dotnet,dotnet10"
  #   image: "chemsorly/coding-agent:kiro-dotnet10"
  #   imagePullPolicy: Always  # Always (default), IfNotPresent, or Never
  #   providerType: kiro
  #   maxConcurrent: 2
  #   resources:
  #     requests:
  #       cpu: "100m"
  #       memory: "256Mi"
  #     limits:
  #       cpu: "4"
  #       memory: "8Gi"
  #   podSecurityContext:
  #     runAsUser: 1000
  #     runAsGroup: 1000
  #     fsGroup: 1000
  #   nodeSelector:
  #     kubernetes.io/hostname: k8s-worker-1
  #   initContainers:
  #     - name: fix-perms
  #       image: busybox:latest
  #       command: ["sh", "-c", "chown -R 1000:1000 /home/ubuntu/.local/share/kiro-cli"]
  #   tolerations:
  #     - key: agents
  #       operator: Exists
  #       effect: NoSchedule

# ── SignalR Backplane (Redis) ────────────────────────────────────────────────

signalr:
  redis:
    # Enable Redis backplane for SignalR. Required for multi-replica orchestrator
    # to deliver agent log streaming and real-time UI updates across replicas.
    enabled: false
    # Connection string for Redis. Operators deploy Redis independently
    # (e.g., Bitnami Redis chart, ElastiCache, Memorystore).
    connectionString: ""

# ── Monitoring ───────────────────────────────────────────────────────────────

monitoring:
  prometheusRules:
    # Create PrometheusRule resources for alerting (requires Prometheus Operator).
    enabled: false
