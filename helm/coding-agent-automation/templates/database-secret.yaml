{{- if and .Values.database.enabled (not .Values.database.auth.existingSecret) .Values.database.connectionString }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "coding-agent-automation.fullname" . }}-db
  labels:
    {{- include "coding-agent-automation.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
type: Opaque
stringData:
  connection-string: {{ .Values.database.connectionString | quote }}
{{- end }}
