{{- if and .Values.database.enabled (eq .Values.workDistribution.mode "Kubernetes") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "coding-agent-automation.fullname" . }}-job-templates
  labels:
    {{- include "coding-agent-automation.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
data:
  job-templates.yaml: |
    {{- if .Values.jobTemplates }}
    {{- /* Primary path: dedicated jobTemplates section (K8s-native schema) */}}
    {{- range .Values.jobTemplates }}
    - labels: {{ .labels | quote }}
      image: {{ .image | quote }}
      imagePullPolicy: {{ .imagePullPolicy | default "Always" | quote }}
      providerType: {{ .providerType | quote }}
      maxConcurrent: {{ .maxConcurrent | default 0 }}
      {{- if .resources }}
      resources:
        {{- if .resources.requests }}
        requests:
          {{- range $k, $v := .resources.requests }}
          {{ $k }}: {{ $v | quote }}
          {{- end }}
        {{- end }}
        {{- if .resources.limits }}
        limits:
          {{- range $k, $v := .resources.limits }}
          {{ $k }}: {{ $v | quote }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- if .podSecurityContext }}
      podSecurityContext:
        {{- toYaml .podSecurityContext | nindent 8 }}
      {{- end }}
      {{- if .nodeSelector }}
      nodeSelector:
        {{- toYaml .nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .initContainers }}
      initContainers:
        {{- toYaml .initContainers | nindent 8 }}
      {{- end }}
      {{- if .tolerations }}
      tolerations:
        {{- toYaml .tolerations | nindent 8 }}
      {{- end }}
    {{- end }}
    {{- else }}
    {{- /* Fallback: derive from agents list (backward compatibility) */}}
    {{- range .Values.agents }}
    {{- if .enabled }}
    - labels: {{ .labels | quote }}
      image: "{{ .image.repository }}:{{ .image.tag }}"
      imagePullPolicy: {{ .imagePullPolicy | default "Always" | quote }}
      providerType: {{ .providerType | quote }}
      maxConcurrent: {{ .maxConcurrent | default 0 }}
      {{- if .resources }}
      resources:
        {{- if .resources.requests }}
        requests:
          {{- range $k, $v := .resources.requests }}
          {{ $k }}: {{ $v | quote }}
          {{- end }}
        {{- end }}
        {{- if .resources.limits }}
        limits:
          {{- range $k, $v := .resources.limits }}
          {{ $k }}: {{ $v | quote }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- if .podSecurityContext }}
      podSecurityContext:
        {{- toYaml .podSecurityContext | nindent 8 }}
      {{- end }}
      {{- if .nodeSelector }}
      nodeSelector:
        {{- toYaml .nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .initContainers }}
      initContainers:
        {{- toYaml .initContainers | nindent 8 }}
      {{- end }}
      {{- if .tolerations }}
      tolerations:
        {{- toYaml .tolerations | nindent 8 }}
      {{- end }}
    {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
