# Wrapper chart values for bare-metal deployment
# Overrides for the coding-agent-automation subchart.

# Set to true to create the namespace resource (useful when ArgoCD doesn't manage it)
createNamespace: false

coding-agent-automation:
  image:
    pullPolicy: Always

  # ── Orchestrator ─────────────────────────────────────────────────────────────

  orchestrator:
    image:
      repository: chemsorly/coding-agent
      tag: coding-agent-webui-latest
    replicas: 1
    annotations:
      reloader.stakater.com/auto: "true"
      keel.sh/policy: force
      keel.sh/trigger: poll
      keel.sh/pollSchedule: "0 0 4 * * *"
      keel.sh/match-tag: "true"
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    initContainers:
      - name: fix-permissions
        image: busybox:latest
        command: ["sh", "-c", "chown -R 1000:1000 /data"]
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        volumeMounts:
          - name: pipeline-config
            mountPath: /data
    service:
      type: ClusterIP
      port: 8080
    resources:
      requests:
        memory: 256Mi
        cpu: 50m
      limits:
        memory: 512Mi
        cpu: 500m
    persistence:
      type: hostPath
      hostPath: /data/coding-agent/config
    nodeSelector:
      kubernetes.io/hostname: k8s-deb-1
    env:
      logLevel: Debug

  # ── Agents ───────────────────────────────────────────────────────────────────

  agents:
    - name: agent-dotnet-1
      enabled: true
      image:
        repository: chemsorly/coding-agent
        tag: coding-agent-kiro-dotnet10-latest
      providerType: kiro
      labels: "kiro,dotnet,dotnet10"
      annotations:
        reloader.stakater.com/auto: "true"
        keel.sh/policy: force
        keel.sh/trigger: poll
        keel.sh/pollSchedule: "0 0 4 * * *"
        keel.sh/match-tag: "true"
      podSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: fix-permissions
          image: busybox:latest
          command: ["sh", "-c", "chown -R 1000:1000 /data"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: kiro-cli-data
              mountPath: /data
      persistence:
        type: hostPath
        hostPath: /data/coding-agent/kiro-cli-data-1
      resources:
        requests:
          memory: 256Mi
          cpu: 50m
        limits:
          memory: 4Gi
          cpu: "2"
      strategy:
        type: Recreate
      nodeSelector:
        kubernetes.io/hostname: k8s-deb-1
      logLevel: Debug

    - name: agent-dotnet-2
      enabled: true
      image:
        repository: chemsorly/coding-agent
        tag: coding-agent-kiro-dotnet10-latest
      providerType: kiro
      labels: "kiro,dotnet,dotnet10"
      annotations:
        reloader.stakater.com/auto: "true"
        keel.sh/policy: force
        keel.sh/trigger: poll
        keel.sh/pollSchedule: "0 0 4 * * *"
        keel.sh/match-tag: "true"
      podSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: fix-permissions
          image: busybox:latest
          command: ["sh", "-c", "chown -R 1000:1000 /data"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: kiro-cli-data
              mountPath: /data
      persistence:
        type: hostPath
        hostPath: /data/coding-agent/kiro-cli-data-2
      resources:
        requests:
          memory: 256Mi
          cpu: 50m
        limits:
          memory: 4Gi
          cpu: "2"
      strategy:
        type: Recreate
      nodeSelector:
        kubernetes.io/hostname: k8s-deb-1
      logLevel: Debug

  # ── Secrets ──────────────────────────────────────────────────────────────────

  secrets:
    agentApiKey: "supersecretapikey1234"

  # ── OpenTelemetry ────────────────────────────────────────────────────────────

  otel:
    endpoint: "http://k8s-monitoring-receiver-collector.k8s-monitoring.svc.cluster.local:4318"
    protocol: "http/protobuf"
    serviceName: coding-agent-orchestrator
    resourceAttributes: "deployment.environment=production,service.namespace=coding-agent-automation"
