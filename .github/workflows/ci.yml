name: CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: arc-runner-set
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --logger trx --results-directory TestResults --filter "Category!=E2E"

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: TestResults
        if: ${{ always() }}

  docker:
    needs: [build-and-test]
    runs-on: arc-runner-set
    timeout-minutes: 30
    container:
      image: moby/buildkit:rootless
      env:
        BUILDKITD_FLAGS: "--oci-worker-no-process-sandbox"

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: dockerfiles/webui.Dockerfile
            tag: coding-agent-webui
          - dockerfile: dockerfiles/agent-dotnet10.Dockerfile
            tag: coding-agent-kiro-dotnet10
          - dockerfile: dockerfiles/agent-python312.Dockerfile
            tag: coding-agent-kiro-python312
          - dockerfile: dockerfiles/agent-java21.Dockerfile
            tag: coding-agent-kiro-java21

    steps:
      - name: Build and push ${{ matrix.tag }}
        shell: sh
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Configure registry auth
          mkdir -p ~/.docker
          AUTH=$(echo -n "${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}" | base64)
          echo "::add-mask::${AUTH}"
          echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"${AUTH}\"}}}" > ~/.docker/config.json

          # Build flags
          OUTPUT="type=image,name=chemsorly/dev:${{ matrix.tag }},push=true"
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            OUTPUT="type=image,name=chemsorly/dev:${{ matrix.tag }},push=false"
          fi

          buildctl-daemonless.sh build \
            --frontend dockerfile.v0 \
            --opt filename=${{ matrix.dockerfile }} \
            --local context=https://${DOCKERHUB_USERNAME}:${{ github.token }}@github.com/${{ github.repository }}.git#${{ github.sha }} \
            --export-cache type=registry,ref=chemsorly/dev:${{ matrix.tag }}-cache \
            --import-cache type=registry,ref=chemsorly/dev:${{ matrix.tag }}-cache \
            --output ${OUTPUT}
