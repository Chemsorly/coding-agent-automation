name: CI

on:
  push:
    branches: [main, 'feature/auto-**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET 10
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --logger trx --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: TestResults
        if: ${{ always() }}

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build CLI PoC image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198571cfb76f00 # v6.18.0
        with:
          context: .
          file: cliPoc.Dockerfile
          push: false
          tags: kiro-cli-poc:ci
          cache-from: type=gha,scope=cli-poc
          cache-to: type=gha,mode=min,scope=cli-poc

      - name: Build Web UI image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198571cfb76f00 # v6.18.0
        with:
          context: .
          file: webUI.Dockerfile
          push: false
          tags: kiro-webui:ci
          cache-from: type=gha,scope=webui
          cache-to: type=gha,mode=min,scope=webui

