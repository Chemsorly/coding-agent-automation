name: CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: arc-runner-set
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --logger trx --results-directory TestResults --filter "Category!=E2E"

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: TestResults
        if: ${{ always() }}

  docker:
    needs: [build-and-test]
    runs-on: arc-runner-set
    timeout-minutes: 30
    container:
      image: quay.io/buildah/stable

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: dockerfiles/webui.Dockerfile
            tag: coding-agent-webui
          - dockerfile: dockerfiles/agent-dotnet10.Dockerfile
            tag: coding-agent-kiro-dotnet10
          - dockerfile: dockerfiles/agent-python312.Dockerfile
            tag: coding-agent-kiro-python312
          - dockerfile: dockerfiles/agent-java21.Dockerfile
            tag: coding-agent-kiro-java21

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build and push ${{ matrix.tag }}
        shell: sh
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Configure registry auth
          AUTH=$(echo -n "${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}" | base64)
          echo "::add-mask::${AUTH}"
          mkdir -p /run/containers/0
          echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"${AUTH}\"}}}" > /run/containers/0/auth.json

          # Use vfs storage driver (no mount syscall needed, works in any container)
          export BUILDAH_ISOLATION=chroot
          sed -i 's/^driver =.*/driver = "vfs"/' /etc/containers/storage.conf 2>/dev/null || true

          # Build
          buildah build \
            --isolation chroot \
            --storage-driver vfs \
            -f ${{ matrix.dockerfile }} \
            -t docker.io/chemsorly/dev:${{ matrix.tag }} \
            .

          # Push only on main
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            buildah push \
              --storage-driver vfs \
              --authfile /run/containers/0/auth.json \
              docker.io/chemsorly/dev:${{ matrix.tag }}
          fi
