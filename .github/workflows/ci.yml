name: CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: arc-runner-set
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --logger trx --results-directory TestResults --filter "Category!=E2E"

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: TestResults
        if: ${{ always() }}

  docker:
    needs: [build-and-test]
    runs-on: arc-runner-set
    timeout-minutes: 30
    container:
      image: gcr.io/kaniko-project/executor:debug

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: dockerfiles/webui.Dockerfile
            tag: coding-agent-webui
          - dockerfile: dockerfiles/agent-dotnet10.Dockerfile
            tag: coding-agent-kiro-dotnet10
          - dockerfile: dockerfiles/agent-python312.Dockerfile
            tag: coding-agent-kiro-python312
          - dockerfile: dockerfiles/agent-java21.Dockerfile
            tag: coding-agent-kiro-java21

    steps:
      - name: Build and push ${{ matrix.tag }}
        shell: sh
        run: |
          # Configure Docker Hub auth
          AUTH=$(echo -n "${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}" | base64)
          echo "::add-mask::${AUTH}"
          mkdir -p /kaniko/.docker
          echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"${AUTH}\"}}}" > /kaniko/.docker/config.json

          # Build flags
          PUSH_FLAG=""
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            PUSH_FLAG="--no-push"
          fi

          # Configure git credentials for context fetch
          export GIT_USERNAME="x-access-token"
          export GIT_PASSWORD="${{ github.token }}"

          # Build args for build-info (only relevant for webui, ignored by other Dockerfiles)
          BUILD_ARGS=""
          BUILD_ARGS="${BUILD_ARGS} --build-arg=BUILD_COMMIT_SHA=${{ github.sha }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg=BUILD_BRANCH=${{ github.ref_name }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg=BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BUILD_ARGS="${BUILD_ARGS} --build-arg=BUILD_RUN_ID=${{ github.run_id }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg=BUILD_RUN_NUMBER=${{ github.run_number }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg=BUILD_IMAGE_TAG=chemsorly/dev:${{ matrix.tag }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg=BUILD_REPOSITORY_URL=${{ github.server_url }}/${{ github.repository }}"

          /kaniko/executor \
            --dockerfile="${{ matrix.dockerfile }}" \
            --context="git://github.com/${{ github.repository }}.git#${{ github.sha }}" \
            --destination="chemsorly/dev:${{ matrix.tag }}" \
            ${BUILD_ARGS} \
            ${PUSH_FLAG} \
            --push-retry 3
