name: CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: arc-runner-set-arm
    timeout-minutes: 120
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore dependencies
        run: dotnet restore --verbosity quiet

      - name: Build
        run: dotnet build --no-restore --configuration Release --verbosity quiet

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity quiet --logger trx --logger "console;verbosity=minimal" --results-directory TestResults --filter "Category!=E2E"

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: TestResults
        if: ${{ always() }}

  docker:
    needs: [build-and-test]
    runs-on: arc-runner-set-arm
    timeout-minutes: 120
    container:
      image: quay.io/buildah/stable

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: dockerfiles/webui.Dockerfile
            tag: coding-agent-webui
          - dockerfile: dockerfiles/kiro/agent-kiro-dotnet10.Dockerfile
            tag: coding-agent-kiro-dotnet10
          - dockerfile: dockerfiles/kiro/agent-kiro-python312.Dockerfile
            tag: coding-agent-kiro-python312
          - dockerfile: dockerfiles/kiro/agent-kiro-java21.Dockerfile
            tag: coding-agent-kiro-java21
          - dockerfile: dockerfiles/opencode/agent-opencode-dotnet10.Dockerfile
            tag: coding-agent-opencode-dotnet10
          - dockerfile: dockerfiles/opencode/agent-opencode-java21.Dockerfile
            tag: coding-agent-opencode-java21
          - dockerfile: dockerfiles/opencode/agent-opencode-python312.Dockerfile
            tag: coding-agent-opencode-python312

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build and push ${{ matrix.tag }}
        shell: sh
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Configure registry auth
          AUTH=$(echo -n "${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}" | base64)
          echo "::add-mask::${AUTH}"
          mkdir -p /run/containers/0
          echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"${AUTH}\"}}}" > /run/containers/0/auth.json

          # Use vfs storage driver (no mount syscall needed, works in any container)
          export BUILDAH_ISOLATION=chroot
          sed -i 's/^driver =.*/driver = "vfs"/' /etc/containers/storage.conf 2>/dev/null || true

          # Build args for build-info (only relevant for webui, ignored by other Dockerfiles)
          BUILD_ARGS=""
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_COMMIT_SHA=${{ github.sha }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_BRANCH=${{ github.ref_name }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_RUN_ID=${{ github.run_id }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_RUN_NUMBER=${{ github.run_number }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_IMAGE_TAG=chemsorly/dev:${{ matrix.tag }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_REPOSITORY_URL=${{ github.server_url }}/${{ github.repository }}"

          # Build the image (cross-compile: ARM build stage runs natively, amd64 runtime via QEMU)
          buildah build \
            --isolation chroot \
            --storage-driver vfs \
            --platform linux/amd64 \
            -f ${{ matrix.dockerfile }} \
            -t docker.io/chemsorly/dev:${{ matrix.tag }} \
            ${BUILD_ARGS} \
            .

          # Push only on main
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            buildah push \
              --storage-driver vfs \
              --authfile /run/containers/0/auth.json \
              docker.io/chemsorly/dev:${{ matrix.tag }}
          fi
