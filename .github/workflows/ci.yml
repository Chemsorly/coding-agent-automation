name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Restore dependencies
        run: dotnet restore --verbosity quiet

      - name: Build
        run: dotnet build --no-restore --configuration Release --verbosity quiet

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity quiet --logger trx --logger "console;verbosity=minimal" --results-directory TestResults --filter "Category!=E2E" --collect:"XPlat Code Coverage"

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@049f7ec958c672fd31d5cc1cb01622dc8d2e23ab # v5.5.10
        with:
          reports: TestResults/**/coverage.cobertura.xml
          targetdir: CoverageReport
          reporttypes: MarkdownAssembliesSummary
        if: ${{ always() && hashFiles('TestResults/**/coverage.cobertura.xml') != '' }}

      - name: Post coverage to PR
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: coverage-ci
          path: CoverageReport/Summary.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ always() && github.event_name == 'pull_request' && hashFiles('CoverageReport/Summary.md') != '' }}

      - name: Write coverage to job summary
        run: cat CoverageReport/Summary.md >> $GITHUB_STEP_SUMMARY
        if: ${{ always() && hashFiles('CoverageReport/Summary.md') != '' }}

      # TODO: Reactivate on next billing cycle (storage budget exhausted)
      # - name: Upload test results
      #   uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      #   with:
      #     name: test-results
      #     path: TestResults
      #   if: ${{ always() }}

  # Secret scanning — detect leaked credentials in code
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

  # Helm chart validation — runs on ALL branches/PRs to catch chart errors early
  helm-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v4.2.3

      - name: Helm lint
        run: helm lint helm/coding-agent-automation/ -f helm/coding-agent-automation/ci-values.yaml

      - name: Helm template
        run: helm template test-release helm/coding-agent-automation/ -f helm/coding-agent-automation/ci-values.yaml > /dev/null

  docker-build:
    needs: [build-and-test]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
        image:
          - dockerfile: dockerfiles/webui.Dockerfile
            tag: coding-agent-webui
          - dockerfile: dockerfiles/kiro/agent-kiro-dotnet10.Dockerfile
            tag: coding-agent-kiro-dotnet10
          - dockerfile: dockerfiles/kiro/agent-kiro-python312.Dockerfile
            tag: coding-agent-kiro-python312
          - dockerfile: dockerfiles/kiro/agent-kiro-java21.Dockerfile
            tag: coding-agent-kiro-java21
          - dockerfile: dockerfiles/opencode/agent-opencode-dotnet10.Dockerfile
            tag: coding-agent-opencode-dotnet10
          - dockerfile: dockerfiles/opencode/agent-opencode-java21.Dockerfile
            tag: coding-agent-opencode-java21
          - dockerfile: dockerfiles/opencode/agent-opencode-python312.Dockerfile
            tag: coding-agent-opencode-python312
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Build and push ${{ matrix.image.tag }} (${{ matrix.arch }})
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Configure registry auth
          AUTH=$(echo -n "${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}" | base64)
          echo "::add-mask::${AUTH}"
          mkdir -p "${XDG_RUNTIME_DIR}/containers"
          echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"${AUTH}\"}}}" > "${XDG_RUNTIME_DIR}/containers/auth.json"

          # Build args for build-info (only relevant for webui, ignored by other Dockerfiles)
          BUILD_ARGS=""
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_COMMIT_SHA=${{ github.sha }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_BRANCH=${{ github.ref_name }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_RUN_ID=${{ github.run_id }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_RUN_NUMBER=${{ github.run_number }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_IMAGE_TAG=chemsorly/coding-agent:${{ matrix.image.tag }}-latest"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_REPOSITORY_URL=${{ github.server_url }}/${{ github.repository }}"

          # Build single-arch image natively
          buildah build \
            --platform ${{ matrix.platform }} \
            -f ${{ matrix.image.dockerfile }} \
            -t docker.io/chemsorly/coding-agent:${{ matrix.image.tag }}-${{ matrix.arch }} \
            ${BUILD_ARGS} \
            .

          # Push per-arch image (used by manifest merge job)
          if [ "${{ github.ref }}" = "refs/heads/main" ] || echo "${{ github.ref }}" | grep -q "^refs/tags/v"; then
            buildah push \
              --authfile "${XDG_RUNTIME_DIR}/containers/auth.json" \
              docker.io/chemsorly/coding-agent:${{ matrix.image.tag }}-${{ matrix.arch }} \
              docker://docker.io/chemsorly/coding-agent:${{ matrix.image.tag }}-${{ matrix.arch }}
          fi

  # Gate job for branch protection — matrix jobs report as "docker-build (arch, ...)"
  # but branch protection requires a single named check. This aggregates the result.
  docker-build-gate:
    needs: [docker-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          if [[ "${{ needs.docker-build.result }}" != "success" ]]; then
            echo "::error::docker-build matrix failed or was cancelled"
            exit 1
          fi

  docker-push:
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: coding-agent-webui
          - tag: coding-agent-kiro-dotnet10
          - tag: coding-agent-kiro-python312
          - tag: coding-agent-kiro-java21
          - tag: coding-agent-opencode-dotnet10
          - tag: coding-agent-opencode-java21
          - tag: coding-agent-opencode-python312

    steps:
      - name: Create and push multi-arch manifest for ${{ matrix.tag }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Configure registry auth
          AUTH=$(echo -n "${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}" | base64)
          echo "::add-mask::${AUTH}"
          mkdir -p "${XDG_RUNTIME_DIR}/containers"
          echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"${AUTH}\"}}}" > "${XDG_RUNTIME_DIR}/containers/auth.json"
          AUTHFILE="${XDG_RUNTIME_DIR}/containers/auth.json"

          IMG="docker.io/chemsorly/coding-agent"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          # Create manifest from per-arch images
          buildah manifest create "${IMG}:${{ matrix.tag }}"
          buildah manifest add --authfile "${AUTHFILE}" "${IMG}:${{ matrix.tag }}" "docker://${IMG}:${{ matrix.tag }}-amd64"
          buildah manifest add --authfile "${AUTHFILE}" "${IMG}:${{ matrix.tag }}" "docker://${IMG}:${{ matrix.tag }}-arm64"

          # Push SHA-tagged manifest (pinnable version)
          buildah manifest push --authfile "${AUTHFILE}" --all \
            "${IMG}:${{ matrix.tag }}" \
            "docker://${IMG}:${{ matrix.tag }}-${SHORT_SHA}"

          # Push latest-tagged manifest
          buildah manifest push --authfile "${AUTHFILE}" --all \
            "${IMG}:${{ matrix.tag }}" \
            "docker://${IMG}:${{ matrix.tag }}-latest"

          # Push version-tagged manifest on tag pushes
          if echo "${{ github.ref }}" | grep -q "^refs/tags/v"; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            buildah manifest push --authfile "${AUTHFILE}" --all \
              "${IMG}:${{ matrix.tag }}" \
              "docker://${IMG}:${{ matrix.tag }}-${VERSION}"
          fi

  # Chart publishing — only on tag pushes (release)
  publish-chart:
    needs: [build-and-test, helm-lint, docker-push]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate tag format
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid tag format: $TAG. Expected vMAJOR.MINOR.PATCH (e.g., v1.2.3)"
            exit 1
          fi
          VERSION="${TAG#v}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Update chart version and image tags
        env:
          VERSION: ${{ steps.parse.outputs.version }}
          SHORT_SHA: ${{ steps.parse.outputs.short_sha }}
        run: |
          CHART_DIR="helm/coding-agent-automation"

          # Update Chart.yaml version and appVersion
          sed -i "s/^version:.*/version: ${VERSION}/" "${CHART_DIR}/Chart.yaml"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "${CHART_DIR}/Chart.yaml"

          # Update all image tags in values.yaml to version-suffixed (Dependabot-compatible semver)
          sed -i "s/tag: coding-agent-webui$/tag: coding-agent-webui-${VERSION}/" "${CHART_DIR}/values.yaml"
          sed -i "s/tag: coding-agent-kiro-dotnet10$/tag: coding-agent-kiro-dotnet10-${VERSION}/" "${CHART_DIR}/values.yaml"
          sed -i "s/tag: coding-agent-kiro-python312$/tag: coding-agent-kiro-python312-${VERSION}/" "${CHART_DIR}/values.yaml"
          sed -i "s/tag: coding-agent-kiro-java21$/tag: coding-agent-kiro-java21-${VERSION}/" "${CHART_DIR}/values.yaml"
          sed -i "s/tag: coding-agent-opencode-dotnet10$/tag: coding-agent-opencode-dotnet10-${VERSION}/" "${CHART_DIR}/values.yaml"
          sed -i "s/tag: coding-agent-opencode-java21$/tag: coding-agent-opencode-java21-${VERSION}/" "${CHART_DIR}/values.yaml"
          sed -i "s/tag: coding-agent-opencode-python312$/tag: coding-agent-opencode-python312-${VERSION}/" "${CHART_DIR}/values.yaml"

          # Add auto-generated header
          sed -i '1i # Auto-generated by release workflow — do not edit manually' "${CHART_DIR}/values.yaml"

          echo "Chart version: ${VERSION}, appVersion: ${VERSION}"
          cat "${CHART_DIR}/Chart.yaml"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.HELM_APP_ID }}
          private-key: ${{ secrets.HELM_APP_PRIVATE_KEY }}
          owner: Chemsorly
          repositories: helm-charts

      - name: Push chart to helm-charts repository
        env:
          VERSION: ${{ steps.parse.outputs.version }}
          SHORT_SHA: ${{ steps.parse.outputs.short_sha }}
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/Chemsorly/helm-charts.git" /tmp/helm-charts
          cd /tmp/helm-charts

          # Remove old chart source and copy fresh
          rm -rf charts/coding-agent-automation/
          mkdir -p charts/coding-agent-automation/
          cp -r "${GITHUB_WORKSPACE}/helm/coding-agent-automation/"* charts/coding-agent-automation/
          rm -f charts/coding-agent-automation/ci-values.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update coding-agent-automation chart v${VERSION} (app: ${SHORT_SHA})" || echo "No changes to commit"
          git push || (git pull --rebase && git push)
