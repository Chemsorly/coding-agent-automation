name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: arc-runner-set-arm
    timeout-minutes: 120
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore dependencies
        run: dotnet restore --verbosity quiet

      - name: Build
        run: dotnet build --no-restore --configuration Release --verbosity quiet

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity quiet --logger trx --logger "console;verbosity=minimal" --results-directory TestResults --filter "Category!=E2E" --collect:"XPlat Code Coverage"

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@049f7ec958c672fd31d5cc1cb01622dc8d2e23ab # v5.5.10
        with:
          reports: TestResults/**/coverage.cobertura.xml
          targetdir: CoverageReport
          reporttypes: MarkdownAssembliesSummary
        if: ${{ always() && hashFiles('TestResults/**/coverage.cobertura.xml') != '' }}

      - name: Post coverage to PR
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: coverage-ci
          path: CoverageReport/AssembliesSummary.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ always() && github.event_name == 'pull_request' && hashFiles('CoverageReport/AssembliesSummary.md') != '' }}

      - name: Write coverage to job summary
        run: cat CoverageReport/AssembliesSummary.md >> $GITHUB_STEP_SUMMARY
        if: ${{ always() && hashFiles('CoverageReport/AssembliesSummary.md') != '' }}

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: TestResults
        if: ${{ always() }}

  docker:
    needs: [build-and-test]
    runs-on: arc-runner-set-arm
    timeout-minutes: 120
    container:
      image: quay.io/buildah/stable

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: dockerfiles/webui.Dockerfile
            tag: coding-agent-webui
          - dockerfile: dockerfiles/kiro/agent-kiro-dotnet10.Dockerfile
            tag: coding-agent-kiro-dotnet10
          - dockerfile: dockerfiles/kiro/agent-kiro-python312.Dockerfile
            tag: coding-agent-kiro-python312
          - dockerfile: dockerfiles/kiro/agent-kiro-java21.Dockerfile
            tag: coding-agent-kiro-java21
          - dockerfile: dockerfiles/opencode/agent-opencode-dotnet10.Dockerfile
            tag: coding-agent-opencode-dotnet10
          - dockerfile: dockerfiles/opencode/agent-opencode-java21.Dockerfile
            tag: coding-agent-opencode-java21
          - dockerfile: dockerfiles/opencode/agent-opencode-python312.Dockerfile
            tag: coding-agent-opencode-python312

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build and push ${{ matrix.tag }}
        shell: sh
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Configure registry auth
          AUTH=$(echo -n "${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}" | base64)
          echo "::add-mask::${AUTH}"
          mkdir -p /run/containers/0
          echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"${AUTH}\"}}}" > /run/containers/0/auth.json

          # Use vfs storage driver (no mount syscall needed, works in any container)
          export BUILDAH_ISOLATION=chroot
          sed -i 's/^driver =.*/driver = "vfs"/' /etc/containers/storage.conf 2>/dev/null || true

          # Build args for build-info (only relevant for webui, ignored by other Dockerfiles)
          BUILD_ARGS=""
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_COMMIT_SHA=${{ github.sha }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_BRANCH=${{ github.ref_name }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_RUN_ID=${{ github.run_id }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_RUN_NUMBER=${{ github.run_number }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_IMAGE_TAG=chemsorly/dev:${{ matrix.tag }}"
          BUILD_ARGS="${BUILD_ARGS} --build-arg BUILD_REPOSITORY_URL=${{ github.server_url }}/${{ github.repository }}"

          # Build multi-arch image (SDK runs natively on ARM via $BUILDPLATFORM, cross-compiles via $TARGETARCH)
          # Builds for both amd64 and arm64, producing a manifest list
          buildah build \
            --isolation chroot \
            --storage-driver vfs \
            --platform linux/amd64,linux/arm64 \
            -f ${{ matrix.dockerfile }} \
            --manifest docker.io/chemsorly/dev:${{ matrix.tag }} \
            ${BUILD_ARGS} \
            .

          # Push manifest (multi-arch) only on main
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            buildah manifest push \
              --storage-driver vfs \
              --authfile /run/containers/0/auth.json \
              --all \
              docker.io/chemsorly/dev:${{ matrix.tag }} \
              docker://docker.io/chemsorly/dev:${{ matrix.tag }}
          fi
