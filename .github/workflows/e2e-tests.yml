name: E2E Tests

on:
  push:
    branches: [main, 'feature/**', 'fix/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    runs-on: arc-runner-set-arm
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright/dotnet:v1.59.0-noble
      options: --platform linux/amd64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install .NET 10 SDK
        shell: sh
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --install-dir /usr/share/dotnet --channel 10.0
          dotnet --version

      - name: Restore
        run: dotnet restore tests/CodingAgentWebUI.E2ETests/CodingAgentWebUI.E2ETests.csproj

      - name: Build
        run: dotnet build tests/CodingAgentWebUI.E2ETests/ -c Debug

      - name: Run E2E Tests
        run: dotnet test tests/CodingAgentWebUI.E2ETests/ -c Debug --no-build --filter "Category=E2E" --logger trx --results-directory TestResults
        env:
          ASPNETCORE_ENVIRONMENT: Development

      - name: Upload screenshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-screenshots
          path: TestResults/screenshots/

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: e2e-test-results
          path: TestResults/
