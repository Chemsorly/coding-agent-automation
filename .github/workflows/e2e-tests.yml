name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    runs-on: arc-runner-set-arm
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright/dotnet:v1.60.0-noble
      options: --platform linux/amd64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install .NET 10 SDK
        shell: sh
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --install-dir /usr/share/dotnet --channel 10.0
          dotnet --version

      - name: Restore
        run: dotnet restore tests/CodingAgentWebUI.E2ETests/CodingAgentWebUI.E2ETests.csproj

      - name: Build
        run: dotnet build tests/CodingAgentWebUI.E2ETests/ -c Debug

      - name: Run E2E Tests
        run: dotnet test tests/CodingAgentWebUI.E2ETests/ -c Debug --no-build --filter "Category=E2E" --logger trx --results-directory TestResults --collect:"XPlat Code Coverage"
        env:
          ASPNETCORE_ENVIRONMENT: Development

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@049f7ec958c672fd31d5cc1cb01622dc8d2e23ab # v5.5.10
        with:
          reports: TestResults/**/coverage.cobertura.xml
          targetdir: CoverageReport
          reporttypes: MarkdownAssembliesSummary
        if: ${{ always() && hashFiles('TestResults/**/coverage.cobertura.xml') != '' }}

      - name: Post coverage to PR
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: coverage-e2e
          path: CoverageReport/AssembliesSummary.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ always() && github.event_name == 'pull_request' && hashFiles('CoverageReport/AssembliesSummary.md') != '' }}

      - name: Write coverage to job summary
        run: cat CoverageReport/AssembliesSummary.md >> $GITHUB_STEP_SUMMARY
        if: ${{ always() && hashFiles('CoverageReport/AssembliesSummary.md') != '' }}

      - name: Upload screenshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-screenshots
          path: TestResults/screenshots/

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: e2e-test-results
          path: TestResults/
